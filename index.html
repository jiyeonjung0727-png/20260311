<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCKY LOTTO · 로또 번호 추천</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0614;
      --surface: #1a0f24;
      --surface-elevated: #241830;
      --neon-pink: #ff2a6a;
      --neon-cyan: #05d9e8;
      --neon-gold: #ffd700;
      --neon-purple: #d300c5;
      --text: #f0e6f4;
      --text-muted: #9a8aa8;
      --success: #00ff88;
      --border: rgba(255, 42, 106, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -30%, rgba(80, 20, 100, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 80% 50% at 80% 80%, rgba(5, 217, 232, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 10% 70%, rgba(255, 42, 106, 0.06) 0%, transparent 50%),
        linear-gradient(180deg, #12081a 0%, #0d0614 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }

    .header {
      width: 100%;
      max-width: 480px;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(26, 15, 36, 0.95) 0%, rgba(13, 6, 20, 0.9) 100%);
      box-shadow: 0 0 30px rgba(255, 42, 106, 0.08);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: #fff;
      text-shadow:
        0 0 10px var(--neon-pink),
        0 0 20px var(--neon-pink),
        0 0 40px rgba(255, 42, 106, 0.5);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-shadow: 0 0 10px var(--success);
    }

    .live-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--success), 0 0 20px var(--success);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 10px var(--success), 0 0 20px var(--success); }
      50% { opacity: 0.7; transform: scale(0.95); box-shadow: 0 0 5px var(--success), 0 0 15px var(--success); }
    }

    .stats-bar {
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      text-align: center;
      padding: 0.65rem 0.5rem;
      background: var(--surface-elevated);
      border: 1px solid rgba(5, 217, 232, 0.2);
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(5, 217, 232, 0.05), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--neon-cyan);
      margin-bottom: 0.2rem;
      text-shadow: 0 0 12px rgba(5, 217, 232, 0.6);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    main {
      width: 100%;
      max-width: 480px;
      flex: 1;
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 0.75rem;
      align-self: flex-start;
      text-shadow: 0 0 10px rgba(5, 217, 232, 0.4);
    }

    .slot-frame {
      width: 100%;
      background: linear-gradient(180deg, #1e1228 0%, #160d1e 100%);
      border: 2px solid rgba(5, 217, 232, 0.35);
      border-radius: 20px;
      padding: 1.75rem 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow:
        0 0 25px rgba(5, 217, 232, 0.15),
        0 0 50px rgba(255, 42, 106, 0.08),
        inset 0 0 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      position: relative;
    }

    .slot-frame::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      padding: 2px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple), var(--neon-cyan));
      background-size: 300% 300%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.5;
      animation: neonBorder 4s ease infinite;
    }

    @keyframes neonBorder {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .slots-wrap {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 72px;
      align-items: center;
    }

    .slot {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: #1a1a14;
      background: linear-gradient(145deg, #2a2035, #1a1225);
      box-shadow: inset 0 -2px 8px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .slot:hover {
      transform: scale(1.15);
      box-shadow: inset 0 -2px 8px rgba(0,0,0,0.6), 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .slot.rolling {
      animation: slotRoll 0.08s ease infinite;
    }

    .slot.landed {
      animation: slotLand 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @keyframes slotRoll {
      0%, 100% { transform: scale(1); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.6), 0 0 0 0 rgba(5, 217, 232, 0.4); }
      50% { transform: scale(1.04); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.6), 0 0 18px 2px rgba(5, 217, 232, 0.5); }
    }

    @keyframes slotLand {
      0% { transform: scale(1.15); }
      70% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .slot .num {
      position: relative;
      z-index: 2;
      text-shadow: 0 1px 0 rgba(255,255,255,0.3);
    }

    .slot[data-n="1"], .slot[data-n="10"], .slot[data-n="19"], .slot[data-n="28"], .slot[data-n="37"] { background: linear-gradient(145deg, #ffe066, #ffd700); border-color: rgba(255, 215, 0, 0.5); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 15px rgba(255, 215, 0, 0.2); }
    .slot[data-n="2"], .slot[data-n="11"], .slot[data-n="20"], .slot[data-n="29"], .slot[data-n="38"] { background: linear-gradient(145deg, #5dd9a8, #00ff88); border-color: rgba(0, 255, 136, 0.4); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(0, 255, 136, 0.2); }
    .slot[data-n="3"], .slot[data-n="12"], .slot[data-n="21"], .slot[data-n="30"], .slot[data-n="39"] { background: linear-gradient(145deg, #5ac8fa, #05d9e8); border-color: rgba(5, 217, 232, 0.5); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(5, 217, 232, 0.25); }
    .slot[data-n="4"], .slot[data-n="13"], .slot[data-n="22"], .slot[data-n="31"], .slot[data-n="40"] { background: linear-gradient(145deg, #ff5e7a, #ff2a6a); border-color: rgba(255, 42, 106, 0.5); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(255, 42, 106, 0.25); }
    .slot[data-n="5"], .slot[data-n="14"], .slot[data-n="23"], .slot[data-n="32"], .slot[data-n="41"] { background: linear-gradient(145deg, #d96aff, #d300c5); border-color: rgba(211, 0, 197, 0.5); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(211, 0, 197, 0.25); }
    .slot[data-n="6"], .slot[data-n="15"], .slot[data-n="24"], .slot[data-n="33"], .slot[data-n="42"] { background: linear-gradient(145deg, #4ed4c4, #05d9e8); border-color: rgba(5, 217, 232, 0.4); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 10px rgba(5, 217, 232, 0.2); }
    .slot[data-n="7"], .slot[data-n="16"], .slot[data-n="25"], .slot[data-n="34"], .slot[data-n="43"] { background: linear-gradient(145deg, #ffb347, #ffd700); border-color: rgba(255, 215, 0, 0.4); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 10px rgba(255, 215, 0, 0.2); }
    .slot[data-n="8"], .slot[data-n="17"], .slot[data-n="26"], .slot[data-n="35"], .slot[data-n="44"] { background: linear-gradient(145deg, #ff8c5a, #ff2a6a); border-color: rgba(255, 42, 106, 0.4); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 10px rgba(255, 42, 106, 0.2); }
    .slot[data-n="9"], .slot[data-n="18"], .slot[data-n="27"], .slot[data-n="36"], .slot[data-n="45"] { background: linear-gradient(145deg, #a78bfa, #8b5cf6); border-color: rgba(139, 92, 246, 0.4); box-shadow: inset 0 -2px 8px rgba(0,0,0,0.3), 0 0 10px rgba(139, 92, 246, 0.2); }

    .slot.rolling { background: linear-gradient(145deg, #2a2035, #1a1225) !important; color: var(--text-muted); border-color: rgba(5, 217, 232, 0.3); }

    .placeholder-msg {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 400;
    }

    .last-result {
      width: 100%;
      text-align: center;
      padding: 0.6rem 1rem;
      background: var(--surface);
      border: 1px solid rgba(255, 42, 106, 0.25);
      border-radius: 12px;
      margin-bottom: 1.25rem;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255, 42, 106, 0.06);
    }

    .last-result .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-right: 0.5rem;
    }

    .last-result .nums {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--neon-cyan);
      letter-spacing: 0.05em;
      text-shadow: 0 0 12px rgba(5, 217, 232, 0.5);
    }

    .last-result.empty .nums { color: var(--text-muted); font-weight: 400; text-shadow: none; }

    .btn-spin {
      width: 100%;
      max-width: 320px;
      padding: 1rem 1.5rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 2px solid var(--neon-pink);
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(255, 42, 106, 0.2) 0%, rgba(211, 0, 197, 0.1) 100%);
      color: #ff8fab;
      text-shadow: 0 0 15px rgba(255, 42, 106, 0.8);
      box-shadow: 0 0 25px rgba(255, 42, 106, 0.2), inset 0 0 20px rgba(255, 42, 106, 0.05);
      transition: all 0.2s ease;
    }

    .btn-spin:hover {
      background: linear-gradient(180deg, rgba(255, 42, 106, 0.35) 0%, rgba(211, 0, 197, 0.2) 100%);
      box-shadow: 0 0 35px rgba(255, 42, 106, 0.4), 0 0 60px rgba(255, 42, 106, 0.2), inset 0 0 25px rgba(255, 42, 106, 0.08);
      color: #fff;
    }

    .btn-spin:active { transform: scale(0.98); }

    .btn-spin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .winners-panel {
      width: 100%;
      max-width: 480px;
      padding: 1.25rem 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(26, 15, 36, 0.8) 0%, rgba(13, 6, 20, 0.95) 100%);
      box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.3);
    }

    .winners-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .winners-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-shadow: 0 0 10px rgba(5, 217, 232, 0.3);
    }

    .winners-badge {
      font-size: 0.65rem;
      color: var(--neon-gold);
      background: rgba(255, 215, 0, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.3);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }

    .winners-list {
      background: var(--surface-elevated);
      border: 1px solid rgba(5, 217, 232, 0.2);
      border-radius: 14px;
      overflow: hidden;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.2);
    }

    .winner-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.8rem;
    }

    .winner-row:last-child { border-bottom: none; }

    .winner-rank {
      flex-shrink: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      min-width: 36px;
    }

    .winner-rank.rank1 { color: var(--neon-gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    .winner-rank.rank2 { color: #b8c4d0; text-shadow: 0 0 8px rgba(184, 196, 208, 0.3); }
    .winner-rank.rank3 { color: #e8a858; text-shadow: 0 0 8px rgba(232, 168, 88, 0.3); }

    .winner-name { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .winner-amount { color: var(--success); font-weight: 600; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; white-space: nowrap; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

    .footer {
      width: 100%;
      max-width: 480px;
      padding: 1rem 1.25rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    .footer a { color: var(--neon-cyan); text-decoration: none; text-shadow: 0 0 10px rgba(5, 217, 232, 0.3); }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      z-index: 9999;
      max-width: 90%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .toast[aria-hidden="false"] { opacity: 1; }
    .toast-ok { background: rgba(0, 255, 136, 0.2); border: 1px solid #00ff88; color: #00ff88; }
    .toast-error { background: rgba(255, 42, 106, 0.2); border: 1px solid #ff2a6a; color: #ff8fab; }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo">LUCKY LOTTO</span>
    <span class="live-badge">Live</span>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="statSpins">0</div>
      <div class="stat-label">오늘 추천</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statOdds">1/814만</div>
      <div class="stat-label">1등 확률</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statLucky">—</div>
      <div class="stat-label">행운의 숫자</div>
    </div>
  </div>

  <main>
    <span class="section-label">Lucky Numbers</span>

    <div class="slot-frame">
      <div class="slots-wrap" id="slotsWrap">
        <span class="placeholder-msg" id="placeholder">SPIN으로 번호를 받으세요</span>
      </div>
    </div>

    <div class="last-result empty" id="lastResult">
      <span class="label">방금 나온 번호</span>
      <span class="nums" id="lastResultNums">—</span>
    </div>

    <button type="button" class="btn-spin" id="btnGenerate">Spin</button>
  </main>

  <section class="winners-panel">
    <div class="winners-header">
      <span class="winners-title">실시간 당첨 현황</span>
      <span class="winners-badge">1~3등</span>
    </div>
    <div class="winners-list" id="winnersList"></div>
  </section>

  <footer class="footer">
    재미로만 이용하세요 · 당첨 결과는 시뮬레이션입니다
  </footer>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    function showToast(msg, isError) {
      var el = document.getElementById('toast');
      if (!el) return;
      el.textContent = msg;
      el.className = 'toast ' + (isError ? 'toast-error' : 'toast-ok');
      el.setAttribute('aria-hidden', 'false');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(function () {
        el.className = 'toast';
        el.textContent = '';
        el.setAttribute('aria-hidden', 'true');
      }, 4000);
    }

    // Vercel 환경 변수에서 Supabase 설정 로드 (api/config)
    var configUrl = (typeof window !== 'undefined' && window.location && window.location.origin)
      ? window.location.origin + '/api/config'
      : '/api/config';
    const supabasePromise = fetch(configUrl)
      .then(function (r) {
        if (!r.ok) throw new Error('api/config ' + r.status);
        return r.json();
      })
      .then(function (c) {
        if (c.supabaseUrl && c.supabaseAnonKey) {
          return window.supabase.createClient(c.supabaseUrl, c.supabaseAnonKey);
        }
        return null;
      })
      .catch(function (e) {
        console.warn('Supabase 설정 로드 실패:', e);
        return null;
      });

    async function saveLottoToSupabase(numbers) {
      var client = await supabasePromise;
      if (!client) {
        showToast('DB 연결 안 됨 → Vercel 환경 변수(SUPABASE_URL, SUPABASE_ANON_KEY) 확인', true);
        return;
      }
      try {
        var result = await client.from('lotto_draws').insert({ numbers: numbers });
        if (result.error) {
          showToast('저장 실패: ' + result.error.message, true);
          console.warn('Supabase 저장 실패:', result.error);
        } else {
          showToast('Supabase에 저장됨', false);
        }
      } catch (e) {
        showToast('저장 오류: ' + (e.message || e), true);
        console.warn('Supabase 저장 오류:', e);
      }
    }

    const MIN = 1;
    const MAX = 45;
    const COUNT = 6;
    const ROLL_DURATION = 1100;
    const ROLL_INTERVAL = 42;
    const DELAY_BETWEEN_SLOTS = 260;

    const SURNAMES = ['김', '이', '박', '최', '정', '강', '조', '윤', '장', '임', '한', '오', '서', '신', '권', '황', '안', '송', '류', '홍'];
    const NAMES = ['민준', '서준', '도윤', '예준', '시우', '주원', '하준', '지호', '지후', '준서', '준우', '도현', '건우', '현우', '지훈', '유준', '선우', '서진', '민재', '현준', '수현', '지유', '서연', '하은', '지아', '수아', '민서', '지민', '소율', '예은'];

    let todaySpins = parseInt(localStorage.getItem('lottoSpins') || '0', 10);
    const todayKey = new Date().toDateString();
    const storedKey = localStorage.getItem('lottoSpinsDate');
    if (storedKey !== todayKey) {
      todaySpins = 0;
      localStorage.setItem('lottoSpinsDate', todayKey);
    }

    function getRandomNumbers() {
      const pool = [];
      for (let i = MIN; i <= MAX; i++) pool.push(i);
      const result = [];
      for (let i = 0; i < COUNT; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(idx, 1)[0]);
      }
      return result.sort((a, b) => a - b);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function formatMoney(n) {
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '원';
    }

    function updateStats() {
      document.getElementById('statSpins').textContent = todaySpins;
      document.getElementById('statOdds').textContent = '1/814만';
      document.getElementById('statLucky').textContent = randomInt(1, 45);
    }

    function updateLastResult(nums) {
      const el = document.getElementById('lastResult');
      const numsEl = document.getElementById('lastResultNums');
      if (!nums || nums.length === 0) {
        el.classList.add('empty');
        numsEl.textContent = '—';
      } else {
        el.classList.remove('empty');
        numsEl.textContent = nums.join(' · ');
      }
    }

    function addWinner() {
      const rank = randomInt(1, 3);
      const name = SURNAMES[randomInt(0, SURNAMES.length - 1)] + NAMES[randomInt(0, NAMES.length - 1)].slice(0, 1) + '**';
      let amount;
      if (rank === 1) amount = randomInt(1500000000, 2500000000);
      else if (rank === 2) amount = randomInt(50000000, 80000000);
      else amount = randomInt(1000000, 5000000);

      const list = document.getElementById('winnersList');
      const row = document.createElement('div');
      row.className = 'winner-row';
      row.innerHTML = '<span class="winner-rank rank' + rank + '">' + rank + '등</span><span class="winner-name">' + name + ' 님</span><span class="winner-amount">' + formatMoney(amount) + '</span>';
      list.insertBefore(row, list.firstChild);
      while (list.children.length > 18) list.removeChild(list.lastChild);
    }

    function createSlotElement() {
      const el = document.createElement('div');
      el.className = 'slot';
      el.setAttribute('data-n', '0');
      const numSpan = document.createElement('span');
      numSpan.className = 'num';
      numSpan.textContent = '?';
      el.appendChild(numSpan);
      return el;
    }

    function runSlotAnimation(slotIndex, targetNum, slotEls) {
      return new Promise((resolve) => {
        const slot = slotEls[slotIndex];
        const numSpan = slot.querySelector('.num');
        slot.classList.add('rolling');
        slot.removeAttribute('data-n');
        let start = Date.now();
        let lastUpdate = 0;

        function tick() {
          const now = Date.now();
          const elapsed = now - start;
          if (elapsed >= ROLL_DURATION) {
            slot.classList.remove('rolling');
            slot.classList.add('landed');
            slot.setAttribute('data-n', targetNum);
            numSpan.textContent = targetNum;
            setTimeout(() => slot.classList.remove('landed'), 450);
            resolve();
            return;
          }
          if (now - lastUpdate >= ROLL_INTERVAL) {
            lastUpdate = now;
            numSpan.textContent = randomInt(MIN, MAX);
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      });
    }

    async function spinAllSlots(finalNumbers) {
      const wrap = document.getElementById('slotsWrap');
      const placeholder = document.getElementById('placeholder');
      if (placeholder && placeholder.parentNode) placeholder.remove();

      wrap.innerHTML = '';
      const slotEls = [];
      for (let i = 0; i < COUNT; i++) {
        const el = createSlotElement();
        wrap.appendChild(el);
        slotEls.push(el);
      }

      const btn = document.getElementById('btnGenerate');
      btn.disabled = true;

      for (let i = 0; i < COUNT; i++) {
        await runSlotAnimation(i, finalNumbers[i], slotEls);
        if (i < COUNT - 1) await new Promise(r => setTimeout(r, DELAY_BETWEEN_SLOTS));
      }

      todaySpins += 1;
      localStorage.setItem('lottoSpins', String(todaySpins));
      updateStats();
      updateLastResult(finalNumbers);
      saveLottoToSupabase(finalNumbers);
      btn.disabled = false;
    }

    document.getElementById('btnGenerate').addEventListener('click', () => {
      const numbers = getRandomNumbers();
      spinAllSlots(numbers);
    });

    updateStats();
    setInterval(() => {
      document.getElementById('statLucky').textContent = randomInt(1, 45);
    }, 5000);
    addWinner();
    setInterval(addWinner, 4000);
  </script>
</body>
</html>
